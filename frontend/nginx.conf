server {
    listen 80;
    server_name _;

    # K8s health probe endpoint
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Proxy: list all tickets
    location /api/tickets {
        proxy_pass         http://backend-service:3001/api/tickets;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Proxy: create / list bookings
    location /api/bookings {
        proxy_pass         http://backend-service:3001/api/bookings;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Content-Type      $content_type;
        proxy_read_timeout 30s;
    }

    # Proxy: event categories
    location /api/events {
        proxy_pass         http://backend-service:3001/api/events;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }

    # Serve SPA — all other paths go to index.html
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}