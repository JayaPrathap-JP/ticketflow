apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ticketflow
  annotations:
    kubernetes.io/change-cause: "initial deploy"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # zero-downtime: never kill a pod before a new one is ready
      maxSurge: 1          # spin up 1 extra pod during rollout
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB_USER/ticketflow-backend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"