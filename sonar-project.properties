sonar.projectKey=ticketflow-backend
sonar.projectName=TicketFlow Backend
sonar.projectVersion=2.0

sonar.sources=backend
sonar.exclusions=**/node_modules/**,**/tests/**,**/coverage/**

sonar.tests=backend/tests
sonar.test.inclusions=**/*.test.js

# Coverage report path — generated by Jest --coverage
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.coverage.exclusions=**/tests/**,**/node_modules/**